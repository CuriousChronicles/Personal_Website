        .cooked-page {
            width: 100%;
            max-width: 580px;
            padding-bottom: 60px;
        }
        .cooked-form-card {
            background-color: var(--line-clr);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 8px var(--shadow-clr);
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .cooked-input {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--base-clr);
            border: 1px solid var(--secondary-text-clr);
            border-radius: 8px;
            color: var(--text-clr);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .cooked-input:focus {
            border-color: var(--accent-clr);
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .cooked-slider {
            flex: 1;
            accent-color: var(--accent-clr);
            cursor: pointer;
        }
        .slider-value {
            min-width: 44px;
            text-align: right;
            color: var(--accent-clr);
            font-weight: 600;
        }
        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            background-color: var(--accent-clr);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-card {
            background-color: var(--line-clr);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 4px 8px var(--shadow-clr);
            display: none;
        }
        .result-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 12px;
        }
        .result-tier {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-clr);
            margin: 0 0 6px;
        }
        .result-score {
            font-size: 0.9rem;
            color: var(--secondary-text-clr);
            margin: 0 0 24px;
        }
        .result-quote {
            font-size: 1.05rem;
            color: var(--secondary-text-clr);
            font-style: italic;
            line-height: 1.7;
            max-width: 400px;
            margin: 0 auto;
        }
    </style>

    <main>
        <div class="cooked-page">
            <div class="page-header">
                <h2>Am I Cooked?</h2>
                <p class="page-subtitle">Fill in the details and find out exactly how cooked you are.</p>
            </div>

            <div class="cooked-form-card">
                <form id="cooked-form">
                    <div class="form-group">
                        <label for="hours-until-due">Hours until your assignment is due</label>
                        <input class="cooked-input" type="number" id="hours-until-due" min="0" max="168" step="0.5" placeholder="e.g. 12" required>
                    </div>
                    <div class="form-group">
                        <label for="hours-of-sleep">Hours of sleep last night</label>
                        <input class="cooked-input" type="number" id="hours-of-sleep" min="0" max="24" step="0.5" placeholder="e.g. 5" required>
                    </div>
                    <div class="form-group">
                        <label for="assignments-count">How many assignments are due soon?</label>
                        <input class="cooked-input" type="number" id="assignments-count" min="1" max="20" step="1" placeholder="e.g. 2" required>
                    </div>
                    <div class="form-group">
                        <label>How much of it is done?</label>
                        <div class="slider-row">
                            <input class="cooked-slider" type="range" id="percent-done" min="0" max="100" value="0">
                            <span class="slider-value" id="percent-value">0%</span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">Check my fate</button>
                </form>
            </div>

            <div class="result-card" id="result-section">
                <span class="result-emoji" id="result-emoji"></span>
                <h3 class="result-tier" id="result-tier"></h3>
                <p class="result-score" id="result-score"></p>
                <p class="result-quote" id="result-quote"></p>
            </div>
        </div>
    </main>

    <script>
        // Replace with your Render URL after deploying
        const API_URL = 'https://YOUR-APP.onrender.com';

        const form = document.getElementById('cooked-form');
        const resultSection = document.getElementById('result-section');
        const submitBtn = document.getElementById('submit-btn');
        const percentSlider = document.getElementById('percent-done');
        const percentDisplay = document.getElementById('percent-value');

        percentSlider.addEventListener('input', () => {
            percentDisplay.textContent = percentSlider.value + '%';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Calculating your fate...';
            resultSection.style.display = 'none';

            const payload = {
                hours_until_due: parseFloat(document.getElementById('hours-until-due').value),
                hours_of_sleep: parseFloat(document.getElementById('hours-of-sleep').value),
                assignments_count: parseInt(document.getElementById('assignments-count').value),
                percent_done: parseFloat(percentSlider.value),
            };

            try {
                const res = await fetch(`${API_URL}/cooked`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) throw new Error('Server error');
                const data = await res.json();

                document.getElementById('result-emoji').textContent = data.emoji;
                document.getElementById('result-tier').textContent = data.tier;
                document.getElementById('result-score').textContent = `Cooked score: ${data.score}/100`;
                document.getElementById('result-quote').textContent = data.quote;
            } catch {
                document.getElementById('result-emoji').textContent = '⚠️';
                document.getElementById('result-tier').textContent = 'Could not connect';
                document.getElementById('result-score').textContent = '';
                document.getElementById('result-quote').textContent = 'The server might be waking up (Render cold start). Wait ~30s and try again.';
            } finally {
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                submitBtn.disabled = false;
                submitBtn.textContent = 'Check my fate';
            }
        });
    </script>
